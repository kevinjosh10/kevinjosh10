name: Update 1000-Day Journey Progress

on:
  schedule:
    - cron: "0 */4 * * *" # Runs every 4 hours
  workflow_dispatch:

jobs:
  update-progress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Generators (Journey & Joke)
        run: |
          python scripts/generate_about_me.py
          python scripts/update_journey.py
          python scripts/generate_header.py
          python scripts/generate_quote.py
      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Journey Progress Update"
          branch: main
