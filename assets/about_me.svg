<svg width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glowing text filter -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradient for main title -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <style>
      .main-title {
        fill: url(#neonGradient);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 32px;
        font-weight: 900;
        text-anchor: middle;
        letter-spacing: 1px;
        opacity: 0;
        animation: fadeUp 0.8s ease-out forwards 0.2s;
        filter: url(#glowCyan);
      }
      
      .sub-title {
        fill: #f8fafc;
        font-family: 'Courier New', Courier, monospace;
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fadeUp 0.8s ease-out forwards 0.6s;
      }
      
      .tagline {
        fill: #94a3b8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 15px;
        font-weight: 500;
        font-style: italic;
        text-anchor: middle;
        opacity: 0;
        animation: fadeUp 0.8s ease-out forwards 1.0s;
      }
      
      .highlight {
        fill: #39ff14;
        font-weight: bold;
      }

      @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="transparent" />

  <g transform="translate(400, 0)">
    <text x="0" y="60" class="main-title">ARCHITECTING SCALABLE CLOUD SYSTEMS.</text>
    <text x="0" y="110" class="sub-title"><tspan class="highlight">&gt;</tspan> 1st-Year CS <tspan class="highlight">|</tspan> AWS Architect <tspan class="highlight">|</tspan> Cloud Infrastructure Engineer</text>
    <text x="0" y="150" class="tagline">I don't just learn cloud — I build production-grade systems with it.</text>
    <text x="0" y="175" class="tagline">Building in public. Learning out loud. Faith Driven.</text>
  </g>
</svg>
