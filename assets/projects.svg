<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .card {
        cursor: pointer;
        transition: transform 0.3s ease;
        animation: floatUp 0.8s ease-out forwards;
        opacity: 0;
        transform-origin: center;
      }
      .card:hover {
        transform: translateY(-5px);
      }
      .card:hover .card-bg {
        fill: #1e293b;
        stroke: #475569;
      }
      .card-bg {
        fill: #0f172a;
        stroke: #1e293b;
        stroke-width: 2;
        transition: all 0.3s ease;
      }
      .title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .desc {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        fill: #94a3b8;
      }
      .tag {
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        font-weight: bold;
        text-anchor: middle;
      }
      
      @keyframes floatUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <!-- Background container -->
  <rect width="100%" height="100%" fill="transparent" />

  
        <!-- Card: S3 Backup Tool -->
        <a href="https://github.com/kevinjosh10/s3-backup-tool" target="_blank">
            <g class="card" style="animation-delay: 0.0s">
                <rect x="20" y="20" width="370" height="200" rx="12" class="card-bg" />
                <!-- Neon top border highlight -->
                <path d="M 20 32 Q 20 20 32 20 L 378 20 Q 390 20 390 32" stroke="#00f2fe" stroke-width="3" fill="none" class="card-highlight" />
                
                <!-- Icon/Folder -->
                <svg x="45" y="45" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                
                <text x="80" y="63" class="title" fill="#00f2fe">S3 Backup Tool</text>
                
                <text x="45" y="100" class="desc">Resilient CLI utility for metadata-</text>
<text x="45" y="122" class="desc">based incremental synchronization,</text>
<text x="45" y="144" class="desc">encryption, and lifecycle automation.</text>

                
            <rect x="45" y="175" width="64" height="24" rx="12" fill="#00f2fe" fill-opacity="0.15" stroke="#00f2fe" stroke-width="1" />
            <text x="77.0" y="191" class="tag" fill="#00f2fe">Python</text>
            
            <rect x="119" y="175" width="64" height="24" rx="12" fill="#00f2fe" fill-opacity="0.15" stroke="#00f2fe" stroke-width="1" />
            <text x="151.0" y="191" class="tag" fill="#00f2fe">AWS S3</text>
            
            <rect x="193" y="175" width="56" height="24" rx="12" fill="#00f2fe" fill-opacity="0.15" stroke="#00f2fe" stroke-width="1" />
            <text x="221.0" y="191" class="tag" fill="#00f2fe">Boto3</text>
            
            </g>
        </a>
        
        <!-- Card: CloudMorph -->
        <a href="https://github.com/kevinjosh10/CloudMorph" target="_blank">
            <g class="card" style="animation-delay: 0.15s">
                <rect x="410" y="20" width="370" height="200" rx="12" class="card-bg" />
                <!-- Neon top border highlight -->
                <path d="M 410 32 Q 410 20 422 20 L 768 20 Q 780 20 780 32" stroke="#39ff14" stroke-width="3" fill="none" class="card-highlight" />
                
                <!-- Icon/Folder -->
                <svg x="435" y="45" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#39ff14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                
                <text x="470" y="63" class="title" fill="#39ff14">CloudMorph</text>
                
                <text x="435" y="100" class="desc">Serverless file intelligence platform</text>
<text x="435" y="122" class="desc">handling secure cross-origin uploads</text>
<text x="435" y="144" class="desc">and pre-signed URLs via Lambda.</text>

                
            <rect x="435" y="175" width="96" height="24" rx="12" fill="#39ff14" fill-opacity="0.15" stroke="#39ff14" stroke-width="1" />
            <text x="483.0" y="191" class="tag" fill="#39ff14">AWS Lambda</text>
            
            <rect x="541" y="175" width="104" height="24" rx="12" fill="#39ff14" fill-opacity="0.15" stroke="#39ff14" stroke-width="1" />
            <text x="593.0" y="191" class="tag" fill="#39ff14">API Gateway</text>
            
            </g>
        </a>
        
        <!-- Card: Cryptexa -->
        <a href="https://github.com/kevinjosh10/Cryptexa" target="_blank">
            <g class="card" style="animation-delay: 0.3s">
                <rect x="20" y="230" width="370" height="200" rx="12" class="card-bg" />
                <!-- Neon top border highlight -->
                <path d="M 20 242 Q 20 230 32 230 L 378 230 Q 390 230 390 242" stroke="#ff007f" stroke-width="3" fill="none" class="card-highlight" />
                
                <!-- Icon/Folder -->
                <svg x="45" y="255" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff007f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                
                <text x="80" y="273" class="title" fill="#ff007f">Cryptexa</text>
                
                <text x="45" y="310" class="desc">Modular full-stack community platform</text>
<text x="45" y="332" class="desc">built with modern web architecture</text>
<text x="45" y="354" class="desc">and decoupled serverless backends.</text>

                
            <rect x="45" y="385" width="80" height="24" rx="12" fill="#ff007f" fill-opacity="0.15" stroke="#ff007f" stroke-width="1" />
            <text x="85.0" y="401" class="tag" fill="#ff007f">Web Arch</text>
            
            <rect x="135" y="385" width="96" height="24" rx="12" fill="#ff007f" fill-opacity="0.15" stroke="#ff007f" stroke-width="1" />
            <text x="183.0" y="401" class="tag" fill="#ff007f">Serverless</text>
            
            </g>
        </a>
        
        <!-- Card: EMG Sensor Firmware -->
        <a href="https://github.com/kevinjosh10/emg-sensor" target="_blank">
            <g class="card" style="animation-delay: 0.44999999999999996s">
                <rect x="410" y="230" width="370" height="200" rx="12" class="card-bg" />
                <!-- Neon top border highlight -->
                <path d="M 410 242 Q 410 230 422 230 L 768 230 Q 780 230 780 242" stroke="#ffea00" stroke-width="3" fill="none" class="card-highlight" />
                
                <!-- Icon/Folder -->
                <svg x="435" y="255" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffea00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                
                <text x="470" y="273" class="title" fill="#ffea00">EMG Sensor Firmware</text>
                
                <text x="435" y="310" class="desc">End-to-end IoT architecture bridging</text>
<text x="435" y="332" class="desc">embedded firmware with modular</text>
<text x="435" y="354" class="desc">telemetry routing & dashboards.</text>

                
            <rect x="435" y="385" width="40" height="24" rx="12" fill="#ffea00" fill-opacity="0.15" stroke="#ffea00" stroke-width="1" />
            <text x="455.0" y="401" class="tag" fill="#ffea00">IoT</text>
            
            <rect x="485" y="385" width="120" height="24" rx="12" fill="#ffea00" fill-opacity="0.15" stroke="#ffea00" stroke-width="1" />
            <text x="545.0" y="401" class="tag" fill="#ffea00">Hardware Arch</text>
            
            </g>
        </a>
        

</svg>
