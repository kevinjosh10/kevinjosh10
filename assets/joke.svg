<svg width="500" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
    <style>
      .title { fill: #63b3ed; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .text { fill: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; text-anchor: middle; }
      .border { fill: none; stroke: #4a5568; stroke-width: 2; rx: 12px; }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="transparent" rx="12px" />
  
  <text x="50%" y="30" class="title">💻 Dev Joke of the Day</text>
  
  <text x="50%" y="60" class="text">A man is smoking a cigarette and blowing</text>
<text x="50%" y="85" class="text">smoke rings into the air. His girlfriend</text>
<text x="50%" y="110" class="text">becomes irritated with the smoke and says</text>
<text x="50%" y="135" class="text">"Can't you see the warning on the cigarette</text>
<text x="50%" y="160" class="text">pack? Smoking is hazardous to your health!"</text>
<text x="50%" y="185" class="text">to which the man replies, "I am a programmer.</text>
<text x="50%" y="210" class="text">We don't worry about warnings; we only worry</text>
<text x="50%" y="235" class="text">about errors."</text>

</svg>
