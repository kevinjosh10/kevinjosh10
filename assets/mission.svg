<svg width="650" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animated Vibrant Multi-Color Gradient -->
    <linearGradient id="vibrantGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe">
        <animate attributeName="stop-color" values="#00f2fe;#39ff14;#ff007f;#ffea00;#00f2fe" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="33%" stop-color="#39ff14">
        <animate attributeName="stop-color" values="#39ff14;#ff007f;#ffea00;#00f2fe;#39ff14" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="66%" stop-color="#ff007f">
        <animate attributeName="stop-color" values="#ff007f;#ffea00;#00f2fe;#39ff14;#ff007f" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ffea00">
        <animate attributeName="stop-color" values="#ffea00;#00f2fe;#39ff14;#ff007f;#ffea00" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Glowing text filter (expanded bounds) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 38px;
        font-weight: 900;
        text-anchor: middle;
        fill: url(#vibrantGradient);
        filter: url(#glow);
        letter-spacing: 3px;
      }
    </style>
  </defs>

  <text x="50%" y="55" class="title">THE 1000-DAY MISSION</text>
</svg>
