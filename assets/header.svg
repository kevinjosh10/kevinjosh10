<circle cx="-10" cy="215" r="1.5" class="packet"><animate attributeName="cx" from="-10" to="810" dur="5.047106556169979s" begin="3.2877713070377452s" repeatCount="indefinite" /></circle>


  <!-- Isometric Cloud Core -->
  <g id="cloud-core">
    
    <path d="M 650 90 L 624 60" class="neon-beam" />
    <path d="M 650 90 L 676 120" class="neon-beam" />
    <path d="M 650 90 L 680 75" class="neon-beam" />
    <path d="M 650 90 L 632 100" class="neon-beam" />
    
    
        <g class="float-node" style="animation-delay: 0s">
            <path d="M 650 60 L 675.98 75.0 L 650 90 L 624.02 75.0 Z" fill="#ffb703" stroke="#0f172a" stroke-width="1" />
            <path d="M 624.02 75.0 L 650 90 L 650 120 L 624.02 105.0 Z" fill="#fb8500" stroke="#0f172a" stroke-width="1" />
            <path d="M 675.98 75.0 L 650 90 L 650 120 L 675.98 105.0 Z" fill="#e85d04" stroke="#0f172a" stroke-width="1" />
        </g>
        
