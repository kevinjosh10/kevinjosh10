<line x1="545" y1="0" x2="545" y2="200" class="grid-line" style="animation-delay: 2.25s" />
<line x1="580" y1="0" x2="580" y2="200" class="grid-line" style="animation-delay: 2.4s" />
<line x1="615" y1="0" x2="615" y2="200" class="grid-line" style="animation-delay: 2.55s" />
