<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg-rect {
        fill: #0f172a;
      }
      .grid-line {
        stroke: #1e293b;
        stroke-width: 1;
        opacity: 0.5;
        stroke-dasharray: 4 4;
      }
      .packet {
        fill: #00f2fe;
        filter: drop-shadow(0 0 3px #00f2fe);
      }
      .float-node {
        animation: floatNode 4s ease-in-out infinite alternate;
        filter: drop-shadow(0 0 10px rgba(251, 133, 0, 0.4));
      }
      @keyframes floatNode {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-8px); }
      }
      .neon-beam {
        fill: none;
        stroke: #00f2fe;
        stroke-width: 1.5;
        stroke-dasharray: 5 15;
        animation: beamFlow 20s linear infinite;
        opacity: 0.6;
        filter: drop-shadow(0 0 4px #00f2fe);
      }
      @keyframes beamFlow {
        to { stroke-dashoffset: -100; }
      }
      .title-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 38px;
        font-weight: 800;
        fill: #ffffff;
        filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
      }
      .title-accent {
        fill: #ffb703;
      }
      .cursor {
        fill: #00f2fe;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      .glow-border {
        fill: none;
        stroke: #00f2fe;
        stroke-width: 2;
        opacity: 0.3;
        rx: 12px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="12" class="bg-rect" />
  
  <!-- Subtle Grid -->
  <line x1="0" y1="20" x2="800" y2="20" class="grid-line" style="animation-delay: 0.0s" />
